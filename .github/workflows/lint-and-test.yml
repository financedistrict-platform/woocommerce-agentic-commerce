name: Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: PHP ${{ matrix.php }} — ${{ matrix.package }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        package: [core, prism-payment]

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        working-directory: packages/${{ matrix.package }}
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        working-directory: packages/${{ matrix.package }}
        run: vendor/bin/phpunit --testdox

  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Check syntax
        run: |
          find packages/*/includes -name '*.php' -print0 | xargs -0 -n 50 php -l > /dev/null
